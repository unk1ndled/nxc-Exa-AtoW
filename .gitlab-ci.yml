stages:
  - deploy

pages:
  stage: deploy
  image: rust:1.85-slim-bookworm
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  cache:
    key: mdbook-0.4.52
    paths:
      - .cargo/bin/mdbook
      - .cargo/registry/
  before_script:
    - test -x "$CARGO_HOME/bin/mdbook" || cargo install mdbook --version 0.4.52 --locked
  script:
    - "$CARGO_HOME/bin/mdbook" build --dest-dir public
    - test -s public/index.html
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
