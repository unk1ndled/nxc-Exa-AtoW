version: 1
disable_existing_loggers: False
formatters:
  default:
    format: '%(asctime)s - [%(process)s:%(thread)s][%(name)16s]: %(levelname)12s %(message)s'
  colored:
    '()': uvicorn.logging.ColourizedFormatter
    format: '%(asctime)s - [%(process)s:%(thread)s][%(name)16s]: %(levelprefix)12s %(message)s'

handlers:
  stderr:
    formatter: colored
    class: logging.StreamHandler
    stream: ext://sys.stderr
  stdout:
    formatter: colored
    class: logging.StreamHandler
    stream: ext://sys.stdout

loggers:
  uvicorn.error:
    level: INFO
    handlers:
      - stderr
    propagate: no
  uvicorn.access:
    level: INFO
    handlers:
      - stdout
    propagate: no
root:
  level: DEBUG
  handlers:
    - stderr
  propagate: no
