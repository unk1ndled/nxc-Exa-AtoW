version: 1
disable_existing_loggers: False
formatters:
  default:
    format: '%(asctime)s - [%(process)s:%(thread)s][%(name)16s]: %(levelname)12s %(message)s'
  colored:
    '()': uvicorn.logging.ColourizedFormatter
    format: '%(asctime)s - [%(process)s:%(thread)s][%(name)16s]: %(levelprefix)12s %(message)s'

handlers:
  stderr:
    formatter: colored
    class: logging.StreamHandler
    stream: ext://sys.stderr
  stdout:
    formatter: colored
    class: logging.StreamHandler
    stream: ext://sys.stdout
  errFile:
    class: logging.handlers.RotatingFileHandler
    formatter: default
    filename: err.log
    maxBytes: 16777216  # 1 MB
    backupCount: 100
  outFile:
    class: logging.handlers.RotatingFileHandler
    formatter: default
    filename: out.log
    maxBytes: 16777216  # 1 MB
    backupCount: 100

loggers:
  uvicorn.error:
    level: INFO
    handlers:
      - stderr
      - errFile
    propagate: no
  uvicorn.access:
    level: INFO
    handlers:
      - stdout
      - outFile
    propagate: no
root:
  level: DEBUG
  handlers:
    - stderr
    - errFile
  propagate: no
